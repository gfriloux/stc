name: Nix CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the workflow only reads the repo.
permissions:
  contents: read

# Cancel superseded runs on the same ref to save runners.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: Format check + lint (alejandra, statix, deadnix)
        run: nix develop --command just fmt-check lint

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - name: nix flake check (x86_64-linux)
        run: nix flake check --no-write-lock-file --show-trace

  docs-parity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Check en/fr documentation tree parity
        run: bash scripts/check-docs-parity.sh
