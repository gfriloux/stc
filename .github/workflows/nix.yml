name: Nix CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: Format check + lint (alejandra, statix, deadnix)
        run: nix develop --command just fmt-check lint

  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DeterminateSystems/nix-installer-action@v16

      - name: nix flake check (x86_64-linux)
        run: nix flake check --no-write-lock-file
