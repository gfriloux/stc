name: Release

on:
  push:
    tags:
      - "v*"

# Needs write access to create the GitHub release.
permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0 # full history for git-cliff

      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      # Release notes = the current tag's section, rendered by git-cliff from the
      # dev shell so local `just changelog` and CI use the same tool version.
      - name: Generate release notes
        run: nix develop --command git-cliff --latest --strip header --output RELEASE_NOTES.md

      - name: Create GitHub release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          body_path: RELEASE_NOTES.md
